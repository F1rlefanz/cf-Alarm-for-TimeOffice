# 🚀 Secure Release Build Pipeline
# CFAlarm for Time Office - Production Deployment

name: 🔐 Secure Release Build

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (e.g., v1.0.0)
  workflow_dispatch:  # Manual trigger

jobs:
  secure-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: ☕ Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: 🔧 Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: 📋 Cache Gradle Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: 🔐 Setup Keystore from Secrets
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        # Decode keystore from base64
        echo $KEYSTORE_BASE64 | base64 --decode > cf-alarm-release.keystore
        
        # Verify keystore integrity
        keytool -list -v -keystore cf-alarm-release.keystore \
          -alias $KEY_ALIAS \
          -storepass $KEYSTORE_PASSWORD \
          -keypass $KEY_PASSWORD
          
    - name: 🔨 Build Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        chmod +x ./gradlew
        ./gradlew assembleRelease
        
    - name: 📦 Build Release AAB (App Bundle)
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        ./gradlew bundleRelease
        
    - name: 🔍 Verify Signing
      run: |
        # Verify APK signature
        $ANDROID_HOME/build-tools/*/apksigner verify \
          --print-certs app/build/outputs/apk/release/app-release.apk
          
    - name: 📤 Upload Release Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-builds
        path: |
          app/build/outputs/apk/release/app-release.apk
          app/build/outputs/bundle/release/app-release.aab
          
    - name: 🧹 Cleanup Keystore
      if: always()
      run: |
        rm -f cf-alarm-release.keystore
        
    # Optional: Auto-deploy to Play Store
    - name: 🚀 Deploy to Play Store (Beta)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
        packageName: com.github.f1rlefanz.cf_alarmfortimeoffice
        releaseFiles: app/build/outputs/bundle/release/app-release.aab
        track: beta
        status: draft
